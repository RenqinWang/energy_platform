version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - kafka-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka-node2
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: '192.168.1.87:2181'
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://192.168.1.87:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - kafka-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8083:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: energy-platform
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: 192.168.1.87:9092,192.168.1.19:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: 192.168.1.87:2181
    networks:
      - kafka-network

  friendly_shockley:
    image: sensor-streaming-kafka
    container_name: friendly_shockley
    ports:
      - "8000:8000"
    environment:
      ENABLE_SIMULATION: "false"
      SIMULATION_COUNT: "0"
      SIMULATION_NOISE_RATIO: "0.1"
      KAFKA_BOOTSTRAP_SERVERS: "192.168.1.87:9092,192.168.1.19:9092"
      KAFKA_TOPIC_PREFIX: "sensor"
      KAFKA_PRODUCER_ACKS: "all"
      KAFKA_PRODUCER_RETRIES: "3"
      KAFKA_PRODUCER_BATCH_SIZE: "16384"
      KAFKA_PRODUCER_LINGER_MS: "1"
      DATA_DIR: "/data/positions"
      METADATA_FILE: "/data/pos.ttl"
      DEFAULT_PUSH_INTERVAL_MS: "5"
      LOOP_STREAMING: "false"
      LOG_LEVEL: "INFO"
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
    volumes:
      - /home/student/作业2数据:/data:ro
    depends_on:
      - kafka
    networks:
      - kafka-network

volumes:
  zookeeper-data:
  zookeeper-log:
  kafka-data:

networks:
  kafka-network:
    driver: bridge
